<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perrito Surf Animado</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background: radial-gradient(circle at center,#1b3b5f,#0b1b2e);
    font-family:Arial;
    overflow:hidden;
}

h1{
    color:#ffd36b;
    margin-bottom:20px;
    text-shadow:2px 2px 10px rgba(0,0,0,.6);
}

.scene{
    width:420px;
    height:420px;
}

.dog{
    transform-origin:200px 300px;
    animation:float 3.8s ease-in-out infinite;
    filter:drop-shadow(0 20px 15px rgba(0,0,0,.4));
}

/* TABLA */
.board{
    animation:board 3.8s ease-in-out infinite;
    transform-origin:200px 320px;
}

/* SOMBRA */
.shadow{
    animation:shadow 3.8s ease-in-out infinite;
    transform-origin:center;
}

/* BARRIGA RESPIRA */
.belly{
    animation:breath 2.8s ease-in-out infinite;
    transform-origin:center;
}

/* BRAZOS */
.armL{
    transform-origin:160px 210px;
    animation:armL 2s ease-in-out infinite;
}
.armR{
    transform-origin:240px 210px;
    animation:armR 2s ease-in-out infinite;
}

/* OJOS (IMPORTANTE: FIX PARPADEO) */
.eye{
    transform-box:fill-box;
    transform-origin:center;
    animation:blink 5s infinite;
}

@keyframes float{
    0%{transform:translateY(0) rotate(-3deg);}
    50%{transform:translateY(-18px) rotate(3deg);}
    100%{transform:translateY(0) rotate(-3deg);}
}

@keyframes board{
    0%{transform:translateY(0) rotate(-2deg);}
    50%{transform:translateY(6px) rotate(2deg);}
    100%{transform:translateY(0) rotate(-2deg);}
}

@keyframes shadow{
    0%{transform:scale(1);opacity:.35;}
    50%{transform:scale(.6);opacity:.15;}
    100%{transform:scale(1);opacity:.35;}
}

@keyframes breath{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.04);}
}

@keyframes armL{
    0%,100%{transform:rotate(-10deg);}
    50%{transform:rotate(18deg);}
}

@keyframes armR{
    0%,100%{transform:rotate(10deg);}
    50%{transform:rotate(-18deg);}
}

@keyframes blink{
    0%,48%,100%{transform:scaleY(1);}
    50%{transform:scaleY(0.1);}
}
</style>
</head>

<body>

<h1>🐶 Perrito Surf Animado</h1>

<div class="scene">

<svg viewBox="0 0 400 420">

<!-- AGUA -->
<path d="M20 360 Q120 330 200 360 T380 360 L380 420 L20 420 Z"
fill="#ffffff" opacity=".2"/>

<g class="dog">

<!-- SOMBRA -->
<ellipse class="shadow" cx="200" cy="340" rx="80" ry="18" fill="#000"/>

<!-- TABLA -->
<g class="board">
<ellipse cx="200" cy="330" rx="120" ry="18" fill="#ff4d4d"/>
<ellipse cx="200" cy="326" rx="90" ry="6" fill="#ffffff" opacity=".25"/>
</g>

<!-- PATAS -->
<ellipse cx="170" cy="300" rx="16" ry="18" fill="#d9b27c"/>
<ellipse cx="230" cy="300" rx="16" ry="18" fill="#d9b27c"/>

<!-- BRAZO IZQ -->
<g class="armL">
<path d="M160 210 C130 200 120 170 130 150
C145 130 160 160 160 210 Z"
fill="#f2d6a2"/>
</g>

<!-- BRAZO DER -->
<g class="armR">
<path d="M240 210 C270 200 280 170 270 150
C255 130 240 160 240 210 Z"
fill="#f2d6a2"/>
</g>

<!-- CUERPO -->
<ellipse cx="200" cy="240" rx="70" ry="85" fill="#f2d6a2"/>

<!-- BARRIGA -->
<ellipse class="belly" cx="200" cy="260" rx="50" ry="65" fill="#fff1d6"/>

<!-- CABEZA -->
<ellipse cx="200" cy="150" rx="75" ry="65" fill="#f2d6a2"/>

<!-- OREJAS -->
<ellipse cx="140" cy="145" rx="18" ry="30" fill="#caa06a"/>
<ellipse cx="260" cy="145" rx="18" ry="30" fill="#caa06a"/>

<!-- OJOS -->
<ellipse class="eye" cx="175" cy="150" rx="8" ry="6" fill="#111"/>
<ellipse class="eye" cx="225" cy="150" rx="8" ry="6" fill="#111"/>

<!-- NARIZ -->
<ellipse cx="200" cy="165" rx="10" ry="7" fill="#2a2a2a"/>

<!-- HOCICO -->
<ellipse cx="200" cy="180" rx="38" ry="22" fill="#ffe7c2"/>

<!-- BOCA -->
<path d="M185 185 Q200 195 215 185"
stroke="#a07c4f" stroke-width="2" fill="none"/>

</g>
</svg>

</div>

</body>
</html>
