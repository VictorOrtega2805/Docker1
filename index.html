<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker de Victor Manuel Ortega Urbano</title>
    <style>
        /* Fondo oceánico profundo */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: radial-gradient(circle at center, #1b4f72 0%, #113047 70%, #081d2c 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 1000px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Título Dorado Metálico en 3D */
        h1 { 
            color: #ffcc00;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 
                3px 3px 0px #b38600, 
                5px 5px 10px rgba(0, 0, 0, 0.8);
            display: inline-block;
            line-height: 1.3;
        }

        .rocket {
            margin-right: 15px;
            filter: drop-shadow(3px 3px 3px rgba(0,0,0,0.6));
        }

        /* Contenedor de la escena */
        .scene-container {
            width: 380px;
            height: 420px;
            position: relative;
        }

        /* --- ANIMACIONES REALISTAS --- */
        
        /* El perrito se balancea por completo intentando no caerse */
        .surf-dog {
            transform-origin: 190px 330px;
            animation: realisticBalance 2.6s ease-in-out infinite alternate;
            filter: drop-shadow(0px 15px 12px rgba(0, 0, 0, 0.5));
        }

        /* Los bracitos se mueven de arriba a abajo con suavidad para equilibrarse */
        .left-arm {
            transform-origin: 135px 210px;
            animation: leftArmMove 1.3s ease-in-out infinite alternate;
        }

        .right-arm {
            transform-origin: 245px 230px;
            animation: rightArmMove 1.3s ease-in-out infinite alternate-reverse;
        }

        /* Olas de espuma en el fondo */
        .wave-foam {
            animation: foamWave 1s linear infinite;
        }

        @keyframes realisticBalance {
            0% { transform: rotate(-6deg) translateY(0px); }
            50% { transform: rotate(1deg) translateY(-4px); }
            100% { transform: rotate(7deg) translateY(2px); }
        }

        @keyframes leftArmMove {
            0% { transform: rotate(-25deg); }
            100% { transform: rotate(15deg); }
        }

        @keyframes rightArmMove {
            0% { transform: rotate(20deg); }
            100% { transform: rotate(-20deg); }
        }

        @keyframes foamWave {
            0% { transform: translateX(0px); opacity: 0.6; }
            50% { opacity: 0.9; }
            100% { transform: translateX(-15px); opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1><span class="rocket">🚀</span>Bienvenidos al Docker de Victor Manuel Ortega Urbano</h1>
        
        <div class="scene-container">
            <!-- SVG de Alta Fidelidad con Iluminación Realista -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 420" width="100%" height="100%">
                
                <!-- DEFINICIÓN DE GRADIENTES Y MAPAS DE SOMBRAS -->
                <defs>
                    <!-- Piel base del perrito (Gradiente suave de luz real) -->
                    <radialGradient id="skin" cx="45%" cy="35%" r="65%">
                        <stop offset="0%" stop-color="#ffffff"/>
                        <stop offset="60%" stop-color="#f2ebd9"/>
                        <stop offset="100%" stop-color="#decfae"/>
                    </radialGradient>

                    <!-- Sombra profunda para pliegues y axilas -->
                    <linearGradient id="skin-shadow" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#decfae"/>
                        <stop offset="100%" stop-color="#bda77a"/>
                    </linearGradient>

                    <!-- Volumen esférico de la pancita gorda -->
                    <radialGradient id="belly" cx="40%" cy="40%" r="55%">
                        <stop offset="0%" stop-color="#ffffff"/>
                        <stop offset="70%" stop-color="#fdfbf7"/>
                        <stop offset="100%" stop-color="#e3d4b6"/>
                    </radialGradient>

                    <!-- Brillo húmedo de los ojos -->
                    <radialGradient id="eye-glow" cx="35%" cy="35%" r="40%">
                        <stop offset="0%" stop-color="#424949"/>
                        <stop offset="40%" stop-color="#1c1f21"/>
                        <stop offset="100%" stop-color="#0b0c0d"/>
                    </radialGradient>

                    <!-- Tabla de surf realista degradada -->
                    <linearGradient id="surf" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#ff3838"/>
                        <stop offset="40%" stop-color="#ff9f43"/>
                        <stop offset="80%" stop-color="#fed330"/>
                        <stop offset="100%" stop-color="#26de81"/>
                    </linearGradient>
                </defs>

                <!-- EFECTO DE AGUA Y ESPUMA DETRÁS -->
                <g class="wave-foam">
                    <path d="M 40 370 Q 90 350 160 375 T 340 365 L 350 400 L 30 400 Z" fill="#ffffff" opacity="0.3"/>
                    <path d="M 10 380 Q 80 365 180 385 T 370 375 L 370 410 L 10 410 Z" fill="#48dbfb" opacity="0.2"/>
                </g>

                <!-- --- GRUPO PRINCIPAL CON ANIMACIÓN INTEGRADA --- -->
                <g class="surf-dog">
                    
                    <!-- 1. TABLA DE SURF CON REFLEJO -->
                    <path d="M 60 340 C 100 325, 260 325, 310 345 C 325 352, 280 365, 185 365 C 90 365, 45 352, 60 340 Z" fill="url(#surf)"/>
                    <path d="M 75 342 C 120 334, 250 334, 295 346 C 240 354, 130 354, 75 342 Z" fill="#ffffff" opacity="0.25"/> <!-- Brillo superficie -->

                    <!-- 2. PATAS TRASERAS (Apoyadas firmes) -->
                    <!-- Izquierda -->
                    <path d="M 140 310 C 130 310, 125 335, 140 342 C 155 345, 165 325, 160 310 Z" fill="url(#skin-shadow)"/>
                    <ellipse cx="143" cy="338" rx="8" ry="5" fill="#decfae"/>
                    <!-- Derecha -->
                    <path d="M 210 315 C 205 315, 200 338, 215 344 C 230 346, 240 328, 235 315 Z" fill="url(#skin)"/>
                    <ellipse cx="222" cy="341" rx="9" ry="5" fill="#cbd4cf" opacity="0.3"/>

                    <!-- 3. CUERPO CORpulento Y PANCITA GORDA -->
                    <!-- Sombra base del cuerpo -->
                    <path d="M 130 210 C 110 260, 120 320, 185 325 C 250 320, 260 260, 245 210 Z" fill="url(#skin-shadow)"/>
                    <!-- Masa muscular/grasa real -->
                    <path d="M 135 210 C 115 250, 125 315, 185 320 C 245 315, 255 250, 240 210 Z" fill="url(#skin)"/>
                    <!-- LA GRAN PANCITA REDONDA DE LA FOTO -->
                    <path d="M 142 225 C 125 265, 135 315, 185 318 C 235 315, 245 265, 228 225 C 210 205, 160 205, 142 225 Z" fill="url(#belly)"/>
                    <!-- Ombligo / pliegue de la pancita sutil -->
                    <path d="M 180 285 Q 185 290 190 285" stroke="#bda77a" stroke-width="2" fill="none" stroke-linecap="round"/>

                    <!-- 4. BRAZO IZQUIERDO (ALZADO BAILANDO) -->
                    <g class="left-arm">
                        <path d="M 135 210 C 110 210, 100 170, 115 155 C 130 140, 145 175, 140 210 Z" fill="url(#skin)"/>
                        <!-- Almohadilla rosa realista de la pata -->
                        <ellipse cx="116" cy="162" rx="5" ry="7" fill="#ffb8b8" transform="rotate(-20 116 162)"/>
                        <circle cx="110" cy="152" r="2" fill="#ffb8b8"/>
                        <circle cx="116" cy="150" r="2" fill="#ffb8b8"/>
                        <circle cx="122" cy="153" r="2" fill="#ffb8b8"/>
                    </g>

                    <!-- 5. BRAZO DERECHO (EXTENDIDO AL FRENTE) -->
                    <g class="right-arm">
                        <path d="M 240 215 C 265 215, 285 190, 275 175 C 260 160, 235 190, 238 215 Z" fill="url(#skin)"/>
                        <!-- Almohadilla pata derecha -->
                        <ellipse cx="268" cy="182" rx="5" ry="7" fill="#ffb8b8" transform="rotate(20 268 182)"/>
                        <circle cx="262" cy="172" r="2" fill="#ffb8b8"/>
                        <circle cx="269" cy="170" r="2" fill="#ffb8b8"/>
                        <circle cx="275" cy="174" r="2" fill="#ffb8b8"/>
                    </g>

                    <!-- 6. CABEZA GORDITA CON ARRUGAS REALISTAS (Bulldog style) -->
                    <g>
                        <!-- Cuello/Papada -->
                        <ellipse cx="187" cy="205" rx="50" ry="20" fill="url(#skin-shadow)"/>
                        <!-- Cabeza Principal -->
                        <path d="M 140 160 C 130 110, 240 110, 230 160 C 235 195, 135 195, 140 160 Z" fill="url(#skin)"/>
                        
                        <!-- Orejas Caídas Realistas -->
                        <path d="M 142 128 C 135 125, 120 140, 125 155 C 130 165, 142 150, 142 128 Z" fill="url(#skin-shadow)"/>
                        <path d="M 228 128 C 235 125, 250 140, 245 155 C 240 165, 228 150, 228 128 Z" fill="url(#skin-shadow)"/>

                        <!-- Ojitos Negros Entornados (Expresión exacta de tu foto) -->
                        <ellipse cx="165" cy="150" rx="7" ry="5" fill="url(#eye-glow)" transform="rotate(-5 165 150)"/>
                        <circle cx="163" cy="148" r="1.5" fill="#ffffff"/> <!-- Brillo ojo izq -->

                        <ellipse cx="210" cy="150" rx="7" ry="5" fill="url(#eye-glow)" transform="rotate(5 210 150)"/>
                        <circle cx="208" cy="148" r="1.5" fill="#ffffff"/> <!-- Brillo ojo der -->

                        <!-- Arrugas de la frente (Expresión realista) -->
                        <path d="M 175 132 Q 187 128 200 132" stroke="#bda77a" stroke-width="2" fill="none" stroke-linecap="round"/>
                        <path d="M 170 139 Q 187 134 205 139" stroke="#bda77a" stroke-width="2" fill="none" stroke-linecap="round"/>

                        <!-- Hocico Pronunciado y Gofio (Mofletes caídos) -->
                        <path d="M 160 172 C 160 160, 215 160, 215 172 C 215 192, 160 192, 160 172 Z" fill="url(#belly)"/>
                        
                        <!-- Pliegue del moflete medio -->
                        <path d="M 187 168 L 187 186" stroke="#bda77a" stroke-width="1.5" fill="none"/>
                        <path d="M 172 180 Q 187 188 203 180" stroke="#bda77a" stroke-width="2" fill="none" stroke-linecap="round"/>

                        <!-- Nariz Realista Compleja -->
                        <path d="M 177 165 C 177 159, 197 159, 197 165 C 197 172, 177 172, 177 165 Z" fill="#2c3e50"/>
                        <path d="M 181 164 C 183 162, 191 162, 193 164" stroke="#111" stroke-width="1" fill="none"/>
                        <circle cx="183" cy="167" r="1" fill="#111"/>
                        <circle cx="191" cy="167" r="1" fill="#111"/>
                    </g>

                </g>
            </svg>
        </div>
    </div>

</body>
</html>
