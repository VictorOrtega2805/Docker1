<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker de Victor Manuel Ortega Urbano</title>
    <style>
        /* Fondo de estudio fotográfico oceánico */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: radial-gradient(circle at 50% 40%, #1a365d 0%, #0f172a 80%, #020617 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 1000px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Título Premium Dorado con Relieve */
        h1 { 
            color: #ffcc00;
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 30px;
            text-shadow: 
                1px 1px 0px #b38600,
                2px 2px 0px #997300,
                3px 3px 0px #806000,
                5px 5px 15px rgba(0, 0, 0, 0.9);
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .rocket {
            margin-right: 15px;
            filter: drop-shadow(0px 10px 8px rgba(0,0,0,0.7));
        }

        /* Contenedor de la escena hiperrealista */
        .scene-container {
            width: 400px;
            height: 440px;
            position: relative;
        }

        /* --- SISTEMA DE ANIMACIÓN ULTRA FLUIDA --- */
        
        /* Balanceo inercial completo de la física del perrito */
        .surf-dog-group {
            transform-origin: 200px 350px;
            animation: realisticSurf 3.2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite alternate;
            filter: drop-shadow(0px 25px 20px rgba(0, 0, 0, 0.65));
        }

        /* Brazo izquierdo buscando balance de forma independiente */
        .left-arm-joint {
            transform-origin: 135px 215px;
            animation: leftArmBalance 1.6s ease-in-out infinite alternate;
        }

        /* Brazo derecho rítmico */
        .right-arm-joint {
            transform-origin: 265px 225px;
            animation: rightArmBalance 1.6s ease-in-out infinite alternate-reverse;
        }

        /* Dinámica del agua de fondo */
        .water-movement {
            animation: waterFlow 4s ease-in-out infinite alternate;
        }

        @keyframes realisticSurf {
            0% { transform: rotate(-7deg) translateY(2px) translateX(-5px); }
            100% { transform: rotate(7deg) translateY(-6px) translateX(5px); }
        }

        @keyframes leftArmBalance {
            0% { transform: rotate(-28deg) translateY(-2px); }
            100% { transform: rotate(18deg) translateY(1px); }
        }

        @keyframes rightArmBalance {
            0% { transform: rotate(22deg) translateY(1px); }
            100% { transform: rotate(-24deg) translateY(-2px); }
        }

        @keyframes waterFlow {
            0% { transform: scaleY(0.95) translateX(-10px); opacity: 0.4; }
            100% { transform: scaleY(1.05) translateX(10px); opacity: 0.7; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1><span class="rocket">🚀</span>Bienvenidos al Docker de Victor Manuel Ortega Urbano</h1>
        
        <div class="scene-container">
            <!-- Renderizado Vectorial de Avanzada con Iluminación Fotográfica -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 440" width="100%" height="100%">
                
                <defs>
                    <!-- Capa de Iluminación Global de la Piel (Volumen Esférico) -->
                    <radialGradient id="skin-mesh" cx="40%" cy="30%" r="70%">
                        <stop offset="0%" stop-color="#ffffff"/>
                        <stop offset="25%" stop-color="#fdf8ec"/>
                        <stop offset="65%" stop-color="#ebdcb9"/>
                        <stop offset="100%" stop-color="#cbb588"/>
                    </radialGradient>

                    <!-- Sombra Oclusiva para pliegues internos de la piel -->
                    <linearGradient id="shadow-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#cbb588"/>
                        <stop offset="100%" stop-color="#9a8356"/>
                    </linearGradient>

                    <!-- Hiper-volumen de la pancita regordeta (Efecto 3D de la foto) -->
                    <radialGradient id="belly-mesh" cx="45%" cy="35%" r="60%">
                        <stop offset="0%" stop-color="#ffffff"/>
                        <stop offset="35%" stop-color="#fffdf9"/>
                        <stop offset="75%" stop-color="#ebdcb9"/>
                        <stop offset="100%" stop-color="#cca770" stop-opacity="0.8"/>
                    </radialGradient>

                    <!-- Cristalización Húmeda de los Ojos -->
                    <radialGradient id="eye-specular" cx="35%" cy="35%" r="50%">
                        <stop offset="0%" stop-color="#57606f"/>
                        <stop offset="30%" stop-color="#2f3542"/>
                        <stop offset="100%" stop-color="#111215"/>
                    </radialGradient>

                    <!-- Tabla de surf con acabado gloss espejo -->
                    <linearGradient id="surf-gloss" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ff3838"/>
                        <stop offset="30%" stop-color="#ff9f43"/>
                        <stop offset="60%" stop-color="#ffdd59"/>
                        <stop offset="100%" stop-color="#05c46b"/>
                    </linearGradient>

                    <!-- Filtro de Desenfoque Gaussiano Avanzado para sombras suaves de piel -->
                    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="3"/>
                    </filter>
                    <filter id="ultra-soft-blur" x="-30%" y="-30%" width="160%" height="160%">
                        <feGaussianBlur stdDeviation="6"/>
                    </filter>
                </defs>

                <!-- ENTORNO: Estela de agua y espuma realista -->
                <g class="water-movement" filter="url(#soft-blur)">
                    <path d="M 30 385 Q 100 355 200 390 T 370 375 L 380 420 L 20 420 Z" fill="#ffffff" opacity="0.4"/>
                    <path d="M 10 395 Q 120 370 220 400 T 390 385 L 390 430 L 10 430 Z" fill="#00d2d3" opacity="0.2"/>
                </g>

                <!-- --- ENTIDAD PRINCIPAL: PERRITO SURFISTA --- -->
                <g class="surf-dog-group">
                    
                    <!-- Sombra de oclusión debajo del perro sobre la tabla -->
                    <ellipse cx="200" cy="352" rx="75" ry="14" fill="#000000" opacity="0.45" filter="url(#soft-blur)"/>

                    <!-- TABLA DE SURF PROFESIONAL -->
                    <path d="M 50 350 C 95 330, 305 330, 350 350 C 365 360, 310 375, 200 375 C 90 375, 35 360, 50 350 Z" fill="url(#surf-gloss)"/>
                    <!-- Reflejo de luz solar en el chasis de la tabla -->
                    <path d="M 68 351 C 110 341, 290 341, 332 351 C 280 361, 120 361, 68 351 Z" fill="#ffffff" opacity="0.35"/>

                    <!-- PATAS INFERIORES REALISTAS (Soportando el peso) -->
                    <!-- Pata Izquierda (En sombra) -->
                    <path d="M 145 320 C 135 320, 125 342, 142 351 C 158 355, 172 335, 165 320 Z" fill="url(#shadow-gradient)"/>
                    <ellipse cx="146" cy="346" rx="8" ry="4" fill="#cbb588"/>
                    <!-- Pata Derecha (Iluminada) -->
                    <path d="M 225 325 C 220 325, 212 346, 228 353 C 244 355, 256 338, 250 325 Z" fill="url(#skin-mesh)"/>
                    <ellipse cx="236" cy="348" rx="8" ry="4" fill="#ebdcb9"/>

                    <!-- CUERPO ANATÓMICO GORDITO -->
                    <!-- Capa base de volumen de masa -->
                    <path d="M 135 220 C 110 270, 120 330, 200 335 C 280 330, 290 270, 265 220 Z" fill="url(#shadow-gradient)"/>
                    <path d="M 142 220 C 118 260, 128 325, 200 330 C 272 325, 282 260, 258 220 Z" fill="url(#skin-mesh)"/>
                    
                    <!-- LA FAMOSA PANCITA HIPERREALISTA DE LA FOTO -->
                    <path d="M 148 235 C 128 275, 138 325, 200 328 C 262 325, 272 275, 252 235 C 232 215, 168 215, 148 235 Z" fill="url(#belly-mesh)"/>
                    
                    <!-- Sombras de pliegue real en la base de la panza (Efecto rollito) -->
                    <path d="M 160 305 Q 200 316 240 305" stroke="#ba9e6c" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#soft-blur)" opacity="0.8"/>
                    <!-- Ombligo realista -->
                    <path d="M 194 290 Q 200 295 206 290" stroke="#9a8356" stroke-width="2.5" fill="none" stroke-linecap="round"/>

                    <!-- BRAZO IZQUIERDO REALISTA (Articulado e independiente) -->
                    <g class="left-arm-joint">
                        <path d="M 138 220 C 110 220, 95 180, 112 165 C 130 148, 150 185, 142 220 Z" fill="url(#skin-mesh)"/>
                        <!-- Almohadillas plantares rosadas con volumen real -->
                        <ellipse cx="114" cy="172" rx="6" ry="8" fill="#ffbda9" transform="rotate(-25 114 172)"/>
                        <circle cx="106" cy="162" r="2.5" fill="#ffa385"/>
                        <circle cx="114" cy="159" r="2.5" fill="#ffa385"/>
                        <circle cx="122" cy="163" r="2.5" fill="#ffa385"/>
                        <!-- Sombra interna de la axila -->
                        <path d="M 132 200 C 125 205, 122 215, 136 218 Z" fill="#9a8356" opacity="0.5" filter="url(#soft-blur)"/>
                    </g>

                    <!-- BRAZO DERECHO REALISTA (Extendida hacia el frente de la cámara) -->
                    <g class="right-arm-joint">
                        <path d="M 262 225 C 290 225, 310 195, 298 180 C 282 162, 255 195, 258 225 Z" fill="url(#skin-mesh)"/>
                        <!-- Almohadillas pata derecha -->
                        <ellipse cx="290" cy="190" rx="6" ry="8" fill="#ffbda9" transform="rotate(25 290 190)"/>
                        <circle cx="282" cy="180" r="2.5" fill="#ffa385"/>
                        <circle cx="290" cy="177" r="2.5" fill="#ffa385"/>
                        <circle cx="298" cy="181" r="2.5" fill="#ffa385"/>
                    </g>

                    <!-- CABEZA DE ALTA FIDELIDAD CON PLIEGUES ANATÓMICOS -->
                    <g>
                        <!-- Cojín de Papada Inferior para dar volumen al cuello -->
                        <ellipse cx="202" cy="215" rx="55" ry="22" fill="url(#shadow-gradient)"/>
                        <ellipse cx="202" cy="212" rx="52" ry="18" fill="url(#skin-mesh)"/>
                        
                        <!-- Cráneo Principal -->
                        <path d="M 145 165 C 132 110, 268 110, 255 165 C 262 205, 138 205, 145 165 Z" fill="url(#skin-mesh)"/>
                        
                        <!-- Orejas de Bulldog Caídas con sombra de profundidad -->
                        <path d="M 148 132 C 140 128, 122 145, 128 162 C 134 172, 148 155, 148 132 Z" fill="url(#shadow-gradient)"/>
                        <path d="M 252 132 C 260 128, 278 145, 272 162 C 266 172, 252 155, 252 132 Z" fill="url(#shadow-gradient)"/>

                        <!-- Ojitos Fieles al Meme (Entornados y tiernos) -->
                        <ellipse cx="172" cy="155" rx="8" ry="5.5" fill="url(#eye-specular)" transform="rotate(-6 172 155)"/>
                        <circle cx="170" cy="153" r="1.8" fill="#ffffff"/> <!-- Brillo cristalino izquierdo -->

                        <ellipse cx="228" cy="155" rx="8" ry="5.5" fill="url(#eye-specular)" transform="rotate(6 228 155)"/>
                        <circle cx="226" cy="153" r="1.8" fill="#ffffff"/> <!-- Brillo cristalino derecho -->

                        <!-- Arrugas Realistas en la Frente (Sombreadas mediante filtros) -->
                        <path d="M 185 134 Q 200 129 215 134" stroke="#9a8356" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.75"/>
                        <path d="M 178 142 Q 200 136 222 142" stroke="#9a8356" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.75"/>
                        <path d="M 192 148 Q 200 144 208 148" stroke="#9a8356" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>

                        <!-- Hocico Gordo / Mofletes con Gradiente de Luz Real -->
                        <path d="M 165 178 C 165 164, 235 164, 235 178 C 235 200, 165 200, 165 178 Z" fill="url(#belly-mesh)"/>
                        
                        <!-- Línea Realista del Labio Superior dividida -->
                        <path d="M 200 174 L 200 191" stroke="#ba9e6c" stroke-width="2" fill="none"/>
                        <path d="M 180 186 Q 200 196 220 186" stroke="#9a8356" stroke-width="2.5" fill="none" stroke-linecap="round"/>

                        <!-- Nariz de Cuero Húmedo Detallada -->
                        <path d="M 188 170 C 188 163, 212 163, 212 170 C 212 178, 188 178, 188 170 Z" fill="#1e272e"/>
                        <!-- Brillo e iluminación en el tabique nasal -->
                        <path d="M 193 168 C 196 166, 204 166, 207 168" stroke="#718093" stroke-width="1" fill="none"/>
                        <circle cx="194" cy="173" r="1.2" fill="#000000"/>
                        <circle cx="206" cy="173" r="1.2" fill="#000000"/>
                    </g>

                </g>
            </svg>
        </div>
    </div>

</body>
</html>
