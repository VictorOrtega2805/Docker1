<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker de Victor Manuel Ortega Urbano</title>
    <style>
        /* Fondo azul con cuadrícula limpia idéntica a tu diseño */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #0b429c;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px; /* Cuadrícula del fondo */
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Contenedor principal centrado */
        .container {
            max-width: 1000px;
            padding: 20px;
        }

        /* Título Dorado en 3D con sombras idéntico a la imagen */
        h1 { 
            color: #ffcc00;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 40px;
            text-shadow: 
                3px 3px 0px #b38600, 
                5px 5px 5px rgba(0, 0, 0, 0.6);
            display: inline-block;
            line-height: 1.3;
        }

        /* Cohete emoji al inicio del título */
        .rocket {
            margin-right: 15px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }

        /* Imagen central de Steve y el lobo en HD */
        .minecraft-img {
            max-width: 500px;
            width: 100%;
            height: auto;
            margin-top: 10px;
            filter: drop-shadow(0px 15px 20px rgba(0, 0, 0, 0.7));
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Título exacto con el cohete -->
        <h1><span class="rocket">🚀</span>Bienvenidos al Docker de Victor Manuel Ortega Urbano</h1>
        
        <br>
        
        <!-- Imagen de los personajes en alta calidad -->
        <img class="minecraft-img" src="https://i.ibb.co/3mSgYv9/render-minecraft.png" alt="Steve and Wolf">
    </div>

</body>
</html>
