<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker de Victor Manuel Ortega Urbano</title>
    <style>
        /* Fondo azul con cuadrícula limpia */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #0b429c;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 1000px;
            padding: 20px;
        }

        /* Título Dorado en 3D */
        h1 { 
            color: #ffcc00;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 
                3px 3px 0px #b38600, 
                5px 5px 5px rgba(0, 0, 0, 0.6);
            display: inline-block;
            line-height: 1.3;
        }

        .rocket {
            margin-right: 15px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }

        /* --- CONTENEDOR DEL PERRO REALISTA DE FRENTE --- */
        .dog-card {
            width: 280px;
            height: 300px;
            margin: 0 auto;
            position: relative;
        }

        /* Animación de respiración en todo el cuerpo */
        .puppy {
            width: 100%;
            height: 100%;
            position: absolute;
            animation: breathe 3s ease-in-out infinite;
        }

        /* OREJAS CON ANIMACIÓN DE MOVIMIENTO SUTIL */
        .ear {
            position: absolute;
            top: 25px;
            width: 55px;
            height: 85px;
            background-color: #e58e26; /* Color café claro / naranja */
            border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
        }
        .ear-inner {
            position: absolute;
            top: 15px;
            left: 10px;
            width: 35px;
            height: 60px;
            background-color: #f8a5c2; /* Rosita interior */
            border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
        }
        .ear.left {
            left: 35px;
            transform: rotate(-18deg);
            transform-origin: bottom right;
            animation: twitchLeft 4s ease-in-out infinite;
        }
        .ear.right {
            right: 35px;
            transform: rotate(18deg);
            transform-origin: bottom left;
            animation: twitchRight 4s ease-in-out infinite;
        }

        /* CABEZA DEL PERRITO */
        .head {
            position: absolute;
            top: 75px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 125px;
            background-color: #f3a64b;
            border-radius: 70px 70px 65px 65px;
            box-shadow: 0 8px 0px rgba(0,0,0,0.1);
            z-index: 5;
        }

        /* Manchas blancas realistas en la cara */
        .face-blaze {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 55px;
            height: 95px;
            background-color: #ffffff;
            border-radius: 30px 30px 0 0;
        }

        /* OJOS CON ANIMACIÓN DE PARPADEO */
        .eye {
            position: absolute;
            top: 50px;
            width: 18px;
            height: 18px;
            background-color: #2c3e50;
            border-radius: 50%;
            animation: blink 5s linear infinite;
        }
        /* Brillo interno del ojo */
        .eye::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 5px;
            height: 5px;
            background-color: #ffffff;
            border-radius: 50%;
        }
        .eye.left { left: 28px; }
        .eye.right { right: 28px; }

        /* HOCICO, NARIZ Y LENGUITA */
        .snout {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 65px;
            height: 45px;
            background-color: #ffffff;
            border-radius: 50%;
            z-index: 6;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .nose {
            width: 24px;
            height: 15px;
            background-color: #1e272e;
            border-radius: 10px 10px 14px 14px;
            margin-top: 5px;
        }
        /* Pequeña boca feliz */
        .mouth {
            width: 20px;
            height: 8px;
            border-bottom: 3px solid #1e272e;
            border-radius: 0 0 10px 10px;
            margin-top: 2px;
        }

        /* CUERPO SENTADO DE FRENTE */
        .body {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 120px;
            background-color: #e58e26;
            border-radius: 50px 50px 40px 40px;
            z-index: 2;
        }
        /* Pecho blanco afelpado */
        .chest {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 90px;
            background-color: #ffffff;
            border-radius: 40px 40px 30px 30px;
        }

        /* PATAS DELANTERAS SIMÉTRICAS */
        .paw {
            position: absolute;
            bottom: 5px;
            width: 32px;
            height: 55px;
            background-color: #ffffff;
            border-radius: 15px 15px 12px 12px;
            box-shadow: inset 0 -6px 0px #e1e8ed, 0 4px 6px rgba(0,0,0,0.15);
            z-index: 4;
        }
        .paw.left { left: 65px; }
        .paw.right { right: 65px; }

        /* --- KEYFRAMES DE LAS ANIMACIONES --- */
        /* 1. Respiración del perrito */
        @keyframes breathe {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.015) translateY(-3px); }
        }

        /* 2. Parpadeo realista */
        @keyframes blink {
            0%, 48%, 52%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.1); }
        }

        /* 3. Movimiento de oreja izquierda */
        @keyframes twitchLeft {
            0%, 85%, 95%, 100% { transform: rotate(-18deg); }
            90% { transform: rotate(-24deg); }
        }

        /* 4. Movimiento de oreja derecha */
        @keyframes twitchRight {
            0%, 80%, 90%, 100% { transform: rotate(18deg); }
            85% { transform: rotate(24deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1><span class="rocket">🚀</span>Bienvenidos al Docker de Victor Manuel Ortega Urbano</h1>
        
        <div class="dog-card">
            <div class="puppy">
                <div class="ear left"><div class="ear-inner"></div></div>
                <div class="ear right"><div class="ear-inner"></div></div>
                
                <div class="head">
                    <div class="face-blaze"></div>
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                    <div class="snout">
                        <div class="nose"></div>
                        <div class="mouth"></div>
                    </div>
                </div>
                
                <div class="body">
                    <div class="chest"></div>
                </div>

                <div class="paw left"></div>
                <div class="paw right"></div>
            </div>
        </div>
    </div>

</body>
</html>
