<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker de Victor Manuel Ortega Urbano</title>
    <style>
        /* Fondo azul clásico con cuadrícula idéntico al tuyo */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #0b429c;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 1000px;
            padding: 20px;
        }

        /* Título Dorado en 3D */
        h1 { 
            color: #ffcc00;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 40px;
            text-shadow: 
                3px 3px 0px #b38600, 
                5px 5px 5px rgba(0, 0, 0, 0.6);
            display: inline-block;
            line-height: 1.3;
        }

        .rocket {
            margin-right: 15px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }

        /* Contenedor del Lobo Realista */
        .wolf-container {
            width: 320px;
            height: 320px;
            margin: 0 auto;
            position: relative;
            filter: drop-shadow(0px 15px 15px rgba(0, 0, 0, 0.4));
        }

        /* ANIMACIÓN EXCLUSIVA DE LA COLA */
        .dog-tail {
            transform-origin: 255px 105px; /* Punto exacto de unión al cuerpo */
            animation: fastWag 0.3s ease-in-out infinite alternate;
        }

        @keyframes fastWag {
            0% { transform: rotate(-8deg); }
            100% { transform: rotate(12deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1><span class="rocket">🚀</span>Bienvenidos al Docker de Victor Manuel Ortega Urbano</h1>
        
        <div class="wolf-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="100%" height="100%">
                
                <path d="M190 170 L205 160 L205 210 L190 220 Z" fill="#9c9c9c"/>

                <g class="dog-tail">
                    <path d="M255 105 L290 85 L290 100 L255 120 Z" fill="#9c9c9c"/>
                    <path d="M290 85 L300 90 L300 105 L290 100 Z" fill="#b8b8b8"/>
                    <path d="M255 105 L265 100 L300 90 L290 85 Z" fill="#d1d1d1"/>
                </g>

                <path d="M130 120 L255 85 L255 135 L130 170 Z" fill="#bebebe"/> <path d="M130 120 L155 105 L255 85 L255 85 Z" fill="#d6d6d6"/> <path d="M110 130 L135 120 L135 145 L110 155 Z" fill="#cc1111"/>
                <path d="M135 120 L145 123 L145 148 L135 145 Z" fill="#e52222"/>

                <path d="M175 180 L190 170 L190 225 L175 235 Z" fill="#b8b8b8"/>
                <path d="M190 170 L200 175 L200 227 L190 225 Z" fill="#cfcfcf"/>
                <path d="M175 180 L185 175 L190 170 L175 180 Z" fill="#e0e0e0"/>

                <path d="M100 190 L115 180 L115 245 L100 255 Z" fill="#b8b8b8"/>
                <path d="M115 180 L125 185 L125 247 L115 245 Z" fill="#cfcfcf"/>
                <path d="M100 190 L110 185 L115 180 L100 190 Z" fill="#e0e0e0"/>

                <path d="M65 110 L115 90 L115 135 L65 155 Z" fill="#cccccc"/> <path d="M115 90 L135 98 L135 143 L115 135 Z" fill="#b8b8b8"/> <rect x="78" y="118" width="8" height="10" fill="#ffffff" transform="rotate(-5 78 118)"/>
                <rect x="82" y="118" width="4" height="10" fill="#1a1a1a" transform="rotate(-5 78 118)"/>

                <path d="M95 90 L105 85 L105 100 L95 105 Z" fill="#a8a8a8"/>

                <g transform="translate(15, 125) rotate(22)">
                    <rect x="0" y="5" width="65" height="12" fill="#55ffff" stroke="#00aaaa" stroke-width="2"/>
                    <rect x="10" y="9" width="45" height="4" fill="#ffffff" opacity="0.4"/>

            </svg>
        </div>
    </div>

</body>
</html>
