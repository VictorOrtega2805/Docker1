<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker de Victor Manuel Ortega Urbano</title>
    <style>
        /* Fondo azul con cuadrícula limpia idéntico al de tu captura */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #0b429c;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 1000px;
            padding: 20px;
        }

        /* Título Dorado en 3D */
        h1 { 
            color: #ffcc00;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 50px;
            text-shadow: 
                3px 3px 0px #b38600, 
                5px 5px 5px rgba(0, 0, 0, 0.6);
            display: inline-block;
            line-height: 1.3;
        }

        .rocket {
            margin-right: 15px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }

        /* --- ESCENA DEL LOBO DE FRENTE --- */
        .stage {
            width: 240px;
            height: 280px;
            position: relative;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Animación de respiración general */
        .minecraft-wolf-front {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            animation: wolfBreathe 3s ease-in-out infinite;
        }

        /* OREJAS SIMÉTRICAS */
        .ears-container {
            display: flex;
            justify-content: space-between;
            width: 80px;
            height: 16px;
        }
        .ear {
            width: 16px;
            height: 16px;
            background-color: #b4b4b4;
            border-top: 4px solid #9c9c9c;
            animation: earTwitch 4s ease-in-out infinite;
        }
        .ear.left { transform-origin: bottom left; }
        .ear.right { transform-origin: bottom right; }

        /* CABEZA CUADRADA PERFECTA */
        .wolf-head {
            width: 80px;
            height: 72px;
            background-color: #d7d7d7;
            box-shadow: inset 0 -6px 0px #b4b4b4, 0 8px 15px rgba(0,0,0,0.3);
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 8px;
            box-sizing: border-box;
        }

        /* OJOS DE MINECRAFT SIMÉTRICOS (Blanco, Negro, Gris) */
        .eyes-container {
            position: absolute;
            top: 24px;
            width: 64px;
            display: flex;
            justify-content: space-between;
        }
        .eye {
            width: 12px;
            height: 12px;
            background-color: #ffffff;
            position: relative;
        }
        /* Pupila negra interna */
        .eye::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 12px;
            background-color: #1a1a1a;
            right: 0;
            top: 0;
        }

        /* HOCICO CENTRADO CON NARIZ */
        .wolf-muzzle {
            width: 32px;
            height: 24px;
            background-color: #e3e3e3;
            border-bottom: 4px solid #b4b4b4;
            position: relative;
            display: flex;
            justify-content: center;
            z-index: 4;
        }
        /* Nariz negra sobresaliente */
        .wolf-muzzle::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 8px;
            background-color: #1a1a1a;
            top: 0;
        }

        /* COLLAR MORADO CEÑIDO AL CUERPO */
        .wolf-collar {
            width: 64px;
            height: 16px;
            background-color: #7b1fa2; /* El morado exacto de Minecraft */
            box-shadow: inset 0 -4px 0px #5c137a, 0 4px 6px rgba(0,0,0,0.2);
            z-index: 2;
            margin-top: -2px;
        }

        /* CUERPO TRASERO (Visto en perspectiva frontal) */
        .wolf-body {
            width: 56px;
            height: 80px;
            background-color: #c8c8c8;
            box-shadow: inset 0 -10px 0px #b4b4b4;
            z-index: 1;
            margin-top: -4px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 4px;
            box-sizing: border-box;
        }

        /* PATAS DELANTERAS */
        .legs-container {
            width: 72px;
            display: flex;
            justify-content: space-between;
            position: absolute;
            bottom: -60px;
            z-index: 2;
        }
        .leg {
            width: 18px;
            height: 65px;
            background-color: #d7d7d7;
            box-shadow: inset 0 -12px 0px #b4b4b4;
        }
        .leg.right-leg {
            background-color: #c8c8c8;
            box-shadow: inset 0 -12px 0px #a6a6a6;
        }

        /* Corazones flotantes decorativos */
        .heart {
            position: absolute;
            color: #ff3366;
            font-size: 1.6rem;
            animation: floatUp 3.5s linear infinite;
            opacity: 0;
            filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.2));
        }

        /* --- ANIMACIONES --- */
        @keyframes wolfBreathe {
            0%, 100% { transform: translateY(0) scaleY(1); }
            50% { transform: translateY(-5px) scaleY(1.02); }
        }

        @keyframes earTwitch {
            0%, 90%, 100% { transform: rotate(0deg); }
            93% { transform: rotate(-8deg); }
            96% { transform: rotate(8deg); }
        }

        @keyframes floatUp {
            0% { transform: translateY(40px) scale(0.6); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-80px) scale(1.1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1><span class="rocket">🚀</span>Bienvenidos al Docker de Victor Manuel Ortega Urbano</h1>
        
        <!-- Escena del lobo mirando fijamente al frente -->
        <div class="stage">
            <!-- Corazones de fondo -->
            <div class="heart" style="left: -10px; top: 60px; animation-delay: 0s;">❤</div>
            <div class="heart" style="right: -10px; top: 90px; animation-delay: 1.5s;">❤</div>

            <div class="minecraft-wolf-front">
                <!-- Orejas -->
                <div class="ears-container">
                    <div class="ear left"></div>
                    <div class="ear right"></div>
                </div>
                
                <!-- Cabeza con ojos y hocico -->
                <div class="wolf-head">
                    <div class="eyes-container">
                        <div class="eye"></div>
                        <div class="eye"></div>
                    </div>
                    <div class="wolf-muzzle"></div>
                </div>
                
                <!-- Collar -->
                <div class="wolf-collar"></div>
                
                <!-- Cuerpo -->
                <div class="wolf-body"></div>

                <!-- Patas delanteras abajo -->
                <div class="legs-container">
                    <div class="leg left-leg"></div>
                    <div class="leg right-leg"></div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
