<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker de Victor Manuel Ortega Urbano</title>
    <style>
        /* Fondo azul con cuadrícula idéntico al de tus capturas */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #0b429c;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 1000px;
            padding: 20px;
        }

        /* Título Dorado en 3D */
        h1 { 
            color: #ffcc00;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 
                3px 3px 0px #b38600, 
                5px 5px 5px rgba(0, 0, 0, 0.6);
            display: inline-block;
            line-height: 1.3;
        }

        .rocket {
            margin-right: 15px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }

        /* --- ESCENA 3D ISOMÉTRICA --- */
        .scene {
            width: 400px;
            height: 350px;
            margin: 0 auto;
            position: relative;
            perspective: 800px; /* Profundidad de cámara */
        }

        /* Rotación global para igualar la perspectiva de la imagen */
        .wolf-isometric {
            position: absolute;
            left: 35%;
            top: 40%;
            transform-style: preserve-3d;
            transform: rotateX(-25deg) rotateY(45deg);
        }

        /* Clase base para armar cubos con caras */
        .cube {
            position: absolute;
            transform-style: preserve-3d;
        }
        .face {
            position: absolute;
            box-sizing: border-box;
        }

        /* --- CUERPO PRINCIPAL --- */
        .body-cube {
            width: 70px; height: 70px; depth: 120px;
            transform: translate3d(-35px, -35px, -60px);
        }
        .body-cube .front { width: 70px; height: 70px; background: #c2c2c2; transform: rotateY(0deg) translateZ(60px); }
        .body-cube .back  { width: 70px; height: 70px; background: #a8a8a8; transform: rotateY(180deg) translateZ(60px); }
        .body-cube .top   { width: 70px; height: 120px; background: #dbdbdb; transform: rotateX(90deg) translateZ(60px); }
        .body-cube .bottom{ width: 70px; height: 120px; background: #919191; transform: rotateX(-90deg) translateZ(10px); }
        .body-cube .left  { width: 120px; height: 70px; background: #cccccc; transform: rotateY(-90deg) translateZ(35px); }
        .body-cube .right { width: 120px; height: 70px; background: #bebebe; transform: rotateY(90deg) translateZ(35px); }

        /* --- CABEZA CON CASCO DE DIAMANTE --- */
        .head-group {
            position: absolute;
            transform-style: preserve-3d;
            transform: translate3d(-25px, -70px, 65px); /* Al frente y arriba */
        }
