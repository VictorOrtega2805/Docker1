<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker de Victor Manuel Ortega Urbano</title>
    <style>
        /* Fondo de estudio fotográfico oceánico */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: radial-gradient(circle at 50% 40%, #1a365d 0%, #0f172a 80%, #020617 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 1000px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Título Premium Dorado con Relieve */
        h1 { 
            color: #ffcc00;
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 30px;
            text-shadow: 
                1px 1px 0px #b38600,
                2px 2px 0px #997300,
                3px 3px 0px #806000,
                5px 5px 15px rgba(0, 0, 0, 0.9);
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .rocket {
            margin-right: 15px;
            filter: drop-shadow(0px 10px 8px rgba(0,0,0,0.7));
        }

        /* Contenedor de la escena */
        .scene-container {
            width: 400px;
            height: 440px;
            position: relative;
        }

        /* --- SISTEMA DE ANIMACIÓN ULTRA FLUIDA Y SEGURA --- */
        
        /* Balanceo completo del perrito */
        .surf-dog-group {
            transform-origin: 200px 350px;
            animation: realisticSurf 3s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite alternate;
            filter: drop-shadow(0px 20px 15px rgba(0, 0, 0, 0.55));
        }

        /* El hombro izquierdo rota desde ADENTRO del cuerpo (X: 150, Y: 210) */
        .left-arm-joint {
            transform-origin: 150px 210px;
            animation: leftArmBalance 1.5s ease-in-out infinite alternate;
        }

        /* El hombro derecho rota desde ADENTRO del cuerpo (X: 250, Y: 210) */
        .right-arm-joint {
            transform-origin: 250px 210px;
            animation: rightArmBalance 1.5s ease-in-out infinite alternate-reverse;
        }

        /* Movimiento sutil del agua de fondo */
        .water-movement {
            animation: waterFlow 4s ease-in-out infinite alternate;
        }

        @keyframes realisticSurf {
            0% { transform: rotate(-6deg) translateY(2px); }
            100% { transform: rotate(6deg) translateY(-4px); }
        }

        @keyframes leftArmBalance {
            0% { transform: rotate(-20deg); }
            100% { transform: rotate(15deg); }
        }

        @keyframes rightArmBalance {
            0% { transform: rotate(18deg); }
            100% { transform: rotate(-18deg); }
        }

        @keyframes waterFlow {
            0% { transform: scaleY(0.95) translateX(-5px); opacity: 0.4; }
            100% { transform: scaleY(1.05) translateX(5px); opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1><span class="rocket">🚀</span>Bienvenidos al Docker de Victor Manuel Ortega Urbano</h1>
        
        <div class="scene-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 440" width="100%" height="100%">
                
                <defs>
                    <!-- Degradados de piel con volumen esférico real -->
                    <radialGradient id="skin-mesh" cx="45%" cy="30%" r="70%">
                        <stop offset="0%" stop-color="#ffffff"/>
                        <stop offset="30%" stop-color="#fdf8ec"/>
                        <stop offset="75%" stop-color="#ebdcb9"/>
                        <stop offset="100%" stop-color="#caa770"/>
                    </radialGradient>

                    <!-- Sombra interna del cuello y pliegues anatómicos -->
                    <linearGradient id="shadow-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#ebdcb9"/>
                        <stop offset="100%" stop-color="#a89268"/>
                    </linearGradient>

                    <!-- Volumen hiperrealista de la pancita gorda -->
                    <radialGradient id="belly-mesh" cx="50%" cy="40%" r="60%">
                        <stop offset="0%" stop-color="#ffffff"/>
                        <stop offset="40%" stop-color="#fffdfa"/>
                        <stop offset="80%" stop-color="#ebdcb9"/>
                        <stop offset="100%" stop-color="#bfa675"/>
                    </radialGradient>

                    <!-- Cristalización de los ojos oscuros -->
                    <radialGradient id="eye-specular" cx="35%" cy="35%" r="50%">
                        <stop offset="0%" stop-color="#57606f"/>
                        <stop offset="100%" stop-color="#111215"/>
                    </radialGradient>

                    <!-- Tabla de surf gloss -->
                    <linearGradient id="surf-gloss" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ff3838"/>
                        <stop offset="40%" stop-color="#ff9f43"/>
                        <stop offset="80%" stop-color="#ffdd59"/>
                        <stop offset="100%" stop-color="#05c46b"/>
                    </linearGradient>

                    <!-- Filtro para suavizar sombras de unión -->
                    <filter id="soft-blur" x="-10%" y="-10%" width="120%" height="120%">
                        <feGaussianBlur stdDeviation="2.5"/>
                    </filter>
                </defs>

                <!-- ENTORNO: Agua de fondo -->
                <g class="water-movement" filter="url(#soft-blur)">
                    <path d="M 30 385 Q 100 355 200 390 T 370 375 L 380 420 L 20 420 Z" fill="#ffffff" opacity="0.3"/>
                </g>

                <!-- --- GRUPO ANIMADO DEL PERRITO --- -->
                <g class="surf-dog-group">
                    
                    <!-- Sombra de la tabla -->
                    <ellipse cx="200" cy="352" rx="70" ry="12" fill="#000000" opacity="0.4" filter="url(#soft-blur)"/>

                    <!-- TABLA DE SURF -->
                    <path d="M 50 350 C 95 332, 305 332, 350 350 C 365 358, 310 372, 200 372 C 90 372, 35 358, 50 350 Z" fill="url(#surf-gloss)"/>
                    <path d="M 68 351 C 110 342, 290 342, 332 351 C 280 358, 120 358, 68 351 Z" fill="#ffffff" opacity="0.25"/>

                    <!-- PATAS TRASERAS FIJAS (Ffundidas con la base del cuerpo) -->
                    <path d="M 140 320 C 130 320, 128 344, 145 350 C 160 352, 168 335, 162 320 Z" fill="url(#shadow-gradient)"/>
                    <path d="M 225 322 C 220 322, 216 345, 232 351 C 248 352, 256 336, 250 322 Z" fill="url(#skin-mesh)"/>

                    <!-- BRAZO IZQUIERDO REALISTA (Su raíz inicia adentro para que no se abra) -->
                    <g class="left-arm-joint">
                        <!-- Conector del hombro oculto -->
                        <path d="M 155 205 C 130 205, 100 175, 115 158 C 132 142, 160 175, 155 205 Z" fill="url(#skin-mesh)"/>
                        <!-- Almohadillas -->
                        <ellipse cx="118" cy="166" rx="5" ry="7" fill="#ffbda9" transform="rotate(-25 118 166)"/>
                        <circle cx="111" cy="157" r="2.2" fill="#ffa385"/>
                        <circle cx="118" cy="154" r="2.2" fill="#ffa385"/>
                        <circle cx="125" cy="158" r="2.2" fill="#ffa385"/>
                    </g>

                    <!-- BRAZO DERECHO REALISTA (Raíz oculta perfectamente en el torso) -->
                    <g class="right-arm-joint">
                        <!-- Conector del hombro oculto -->
                        <path d="M 245 205 C 270 205, 300 180, 288 163 C 272 147, 240 175, 245 205 Z" fill="url(#skin-mesh)"/>
                        <!-- Almohadillas -->
                        <ellipse cx="282" cy="172" rx="5" ry="7" fill="#ffbda9" transform="rotate(25 282 172)"/>
                        <circle cx="275" cy="163" r="2.2" fill="#ffa385"/>
                        <circle cx="282" cy="160" r="2.2" fill="#ffa385"/>
                        <circle cx="289" cy="164" r="2.2" fill="#ffa385"/>
                    </g>

                    <!-- CUERPO ANATÓMICO CONTINUO -->
                    <!-- Tronco unificado que borra huecos -->
                    <path d="M 140 180 C 115 230, 120 325, 200 332 C 280 325, 285 230, 260 180 Z" fill="url(#shadow-gradient)"/>
                    <path d="M 145 180 C 122 225, 126 318, 200 326 C 274 318, 278 225, 255 180 Z" fill="url(#skin-mesh)"/>
                    
                    <!-- LA GRAN PANCITA ADERIDA AL TRONCO -->
                    <path d="M 148 225 C 128 265, 138 318, 200 321 C 262 318, 272 265, 252 225 C 232 205, 168 205, 148 225 Z" fill="url(#belly-mesh)"/>
                    
                    <!-- Pliegue gordo en la base del abdomen -->
                    <path d="M 162 298 Q 200 310 238 298" stroke="#ba9e6c" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
                    <path d="M 195 282 Q 200 286 205 282" stroke="#9a8356" stroke-width="2" fill="none" stroke-linecap="round"/>

                    <!-- CABEZA PERFECTAMENTE INTEGRADA (Se solapa encima del tronco sin dejar huecos) -->
                    <g>
                        <!-- Sombra difuminada de la papada integrada al pecho -->
                        <ellipse cx="200" cy="182" rx="46" ry="14" fill="#a89268" opacity="0.4" filter="url(#soft-blur)"/>
                        
                        <!-- Base de la cara que se funde con el cuello -->
                        <path d="M 145 155 C 132 105, 268 105, 255 155 C 260 190, 140 190, 145 155 Z" fill="url(#skin-mesh)"/>
                        
                        <!-- Orejas -->
                        <path d="M 148 126 C 141 122, 124 138, 129 154 C 134 162, 148 148, 148 126 Z" fill="url(#shadow-gradient)"/>
                        <path d="M 252 126 C 259 122, 276 138, 271 154 C 266 162, 252 148, 252 126 Z" fill="url(#shadow-gradient)"/>

                        <!-- Ojos reales entornados -->
                        <ellipse cx="174" cy="146" rx="7.5" ry="5" fill="url(#eye-specular)" transform="rotate(-6 174 146)"/>
                        <circle cx="172" cy="144" r="1.5" fill="#ffffff"/>

                        <ellipse cx="226" cy="146" rx="7.5" ry="5" fill="url(#eye-specular)" transform="rotate(6 226 146)"/>
                        <circle cx="224" cy="144" r="1.5" fill="#ffffff"/>

                        <!-- Arrugas de expresión suavizadas -->
                        <path d="M 186 126 Q 200 122 214 126" stroke="#9a8356" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.6"/>
                        <path d="M 180 133 Q 200 128 220 133" stroke="#9a8356" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.6"/>

                        <!-- Mofletes/Hocico con gradiente esférico -->
                        <path d="M 166 168 C 166 155, 234 155, 234 168 C 234 188, 166 188, 166 168 Z" fill="url(#belly-mesh)"/>
                        
                        <!-- Línea del labio real integrada -->
                        <path d="M 200 166 L 200 180" stroke="#ba9e6c" stroke-width="1.5" fill="none"/>
                        <path d="M 184 176 Q 200 185 216 176" stroke="#9a8356" stroke-width="2" fill="none" stroke-linecap="round"/>

                        <!-- Nariz húmeda -->
                        <path d="M 190 161 C 190 155, 210 155, 210 161 C 210 168, 190 168, 190 161 Z" fill="#23272a"/>
                        <path d="M 194 159 C 197 157, 203 157, 206 159" stroke="#718093" stroke-width="0.8" fill="none"/>
                    </g>

                </g>
            </svg>
        </div>
    </div>

</body>
</html>
