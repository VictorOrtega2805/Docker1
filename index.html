<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker de Victor Manuel</title>
    <style>
        /* Fondo azul solicitado */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #1a365d; /* Azul profundo */
            color: #ffffff;
            margin: 0;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        /* Título en colores dorados con efecto metálico */
        h1 { 
            color: #ffd700; /* Dorado base */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6), 
                         0 0 20px rgba(255, 215, 0, 0.4);
            font-size: 2.5rem;
            max-width: 800px;
            margin-bottom: 40px;
        }

        /* --- ANIMACIÓN JUGADOR MINECRAFT (CSS) --- */
        .minecraft-container {
            position: relative;
            width: 120px;
            height: 220px;
            margin-top: 20px;
        }

        /* Personaje flotando y respirando */
        .steve {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: float 3s ease-in-out infinite;
        }

        /* Cabeza de Steve */
        .head {
            width: 50px;
            height: 50px;
            background-color: #c49a6c; /* Piel */
            position: absolute;
            left: 35px;
            top: 0;
            box-shadow: inset -6px -6px 0px #a1764b; /* Sombra pixel */
        }
        /* Pelo de Steve */
        .head::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 14px;
            background-color: #4a2d11; /* Pelo */
            top: 0;
            left: 0;
        }

        /* Torso (Camiseta azul de Minecraft) */
        .torso {
            width: 50px;
            height: 70px;
            background-color: #00a896; /* Azul cian clásico */
            position: absolute;
            left: 35px;
            top: 50px;
            box-shadow: inset -6px -4px 0px #028074;
        }

        /* Brazos con animación de saludo/caminar */
        .arm {
            width: 24px;
            height: 70px;
            position: absolute;
            top: 50px;
            transform-origin: top center;
        }
        .arm.left {
            background-color: #009384;
            left: 11px;
            animation: waveLeft 1.5s ease-in-out infinite alternate;
        }
        .arm.right {
            background-color: #00c2ad;
            left: 85px;
            animation: waveRight 1.5s ease-in-out infinite alternate;
        }
        /* Manos (Piel) */
        .arm::after {
            content: '';
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 16px;
            background-color: #c49a6c;
        }

        /* Piernas (Pantalón azul oscuro) */
        .leg {
            width: 24px;
            height: 75px;
            background-color: #3c44aa;
            position: absolute;
            top: 120px;
            transform-origin: top center;
        }
        .leg.left {
            left: 35px;
            animation: walkLegLeft 1.5s ease-in-out infinite alternate;
        }
        .leg.right {
            left: 61px;
            background-color: #2e3487;
            animation: walkLegRight 1.5s ease-in-out infinite alternate;
        }
        /* Botas */
        .leg::after {
            content: '';
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 12px;
            background-color: #444;
        }

        /* --- KEYFRAMES (ANIMACIONES) --- */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* El brazo derecho saluda constantemente */
        @keyframes waveRight {
            0% { transform: rotate(15deg); }
            100% { transform: rotate(110deg); }
        }
        /* El brazo izquierdo balancea sutilmente */
        @keyframes waveLeft {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(15deg); }
        }
        /* Movimiento leve de piernas simulación caminata flotante */
        @keyframes walkLegLeft {
            0% { transform: rotate(10deg); }
            100% { transform: rotate(-10deg); }
        }
        @keyframes walkLegRight {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }
    </style>
</head>
<body>

    <h1>🚀 Bienvenidos al Docker de Victor Manuel Ortega Urbano</h1>
    
    <!-- Contenedor del Personaje animado de Minecraft -->
    <div class="minecraft-container">
        <div class="steve">
            <div class="head"></div>
            <div class="arm left"></div>
            <div class="torso"></div>
            <div class="arm right"></div>
            <div class="leg left"></div>
            <div class="leg right"></div>
        </div>
    </div>

</body>
</html>
