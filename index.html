<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker de Victor Manuel Ortega Urbano</title>
    <style>
        /* Fondo azul con cuadrícula limpia */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #0b429c;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 1000px;
            padding: 20px;
        }

        /* Título Dorado en 3D */
        h1 { 
            color: #ffcc00;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 60px;
            text-shadow: 
                3px 3px 0px #b38600, 
                5px 5px 5px rgba(0, 0, 0, 0.6);
            display: inline-block;
            line-height: 1.3;
        }

        .rocket {
            margin-right: 15px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }

        /* ---ÁREA DEL PERRITO (LOBO)--- */
        .stage {
            width: 200px;
            height: 200px;
            position: relative;
            margin: 0 auto;
        }

        /* Animación global de respiración */
        .minecraft-wolf {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: breathe 2.5s ease-in-out infinite;
        }

        /* Cabeza */
        .wolf-head {
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: #d7d7d7;
            right: 35px;
            top: 45px;
            box-shadow: -4px 4px 0px #b4b4b4;
            z-index: 3;
        }

        /* Orejas */
        .wolf-head::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 12px;
            background-color: #b4b4b4;
            top: -12px;
            left: 6px;
            box-shadow: 28px 0px 0px #d7d7d7;
        }

        /* Hocico y Nariz */
        .wolf-head::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 16px;
            background-color: #e3e3e3;
            bottom: 0;
            right: -10px;
            box-shadow: 6px 4px 0px #1a1a1a; /* Nariz negra */
        }

        /* Ojos del lobo domesticado (bueno) */
        .wolf-eyes {
            position: absolute;
            width: 6px;
            height: 6px;
            background-color: #fff;
            box-shadow: 0px 4px 0px #2c2c2c, 24px 0px 0px #fff, 24px 4px 0px #2c2c2c;
            top: 20px;
            left: 8px;
            z-index: 4;
        }

        /* Cuerpo */
        .wolf-body {
            position: absolute;
            width: 90px;
            height: 60px;
            background-color: #d7d7d7;
            left: 35px;
            top: 70px;
            box-shadow: inset 0 -8px 0px #b4b4b4;
            z-index: 1;
        }

        /* Collar Morado */
        .wolf-collar {
            position: absolute;
            width: 16px;
            height: 60px;
            background-color: #7b1fa2; /* Morado Minecraft */
            right: 46px;
            top: 70px;
            z-index: 2;
        }

        /* Cola Alegre (Animada) */
        .wolf-tail {
            position: absolute;
            width: 14px;
            height: 40px;
            background-color: #b4b4b4;
            left: 23px;
            top: 70px;
            transform-origin: top center;
            animation: dogWag 0.5s ease-in-out infinite alternate;
            z-index: 1;
        }

        /* Patas cuadradas */
        .pata {
            position: absolute;
            width: 16px;
            height: 50px;
            background-color: #b4b4b4;
            top: 130px;
            z-index: 1;
        }
        .pata.f-1 { left: 50px; }
        .pata.f-2 { left: 72px; background-color: #c8c8c8; }
        .pata.b-1 { left: 98px; }
        .pata.b-2 { left: 114px; background-color: #c8c8c8; }

        /* Corazones flotantes de fondo */
        .heart {
            position: absolute;
            color: #ff3366;
            font-size: 1.5rem;
            animation: floatUp 3s linear infinite;
            opacity: 0;
        }

        /* --- ANIMACIONES CSS --- */
        @keyframes breathe {
            0%, 100% { transform: translateY(0) scaleY(1); }
            50% { transform: translateY(-4px) scaleY(1.02); }
        }

        @keyframes dogWag {
            0% { transform: rotate(-15deg); }
            100% { transform: rotate(30deg); }
        }

        @keyframes floatUp {
            0% { transform: translateY(20px) scale(0.7); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-60px) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1><span class="rocket">🚀</span>Bienvenidos al Docker de Victor Manuel Ortega Urbano</h1>
        
        <!-- Escena del perrito -->
        <div class="stage">
            <!-- Corazones decorativos flotantes -->
            <div class="heart" style="left: 20px; top: 20px; animation-delay: 0s;">❤</div>
            <div class="heart" style="left: 150px; top: 40px; animation-delay: 1.2s;">❤</div>

            <div class="minecraft-wolf">
                <div class="wolf-tail"></div>
                <div class="wolf-body"></div>
                <div class="wolf-collar"></div>
                <div class="wolf-head">
                    <div class="wolf-eyes"></div>
                </div>
                <div class="pata f-1"></div>
                <div class="pata f-2"></div>
                <div class="pata b-1"></div>
                <div class="pata b-2"></div>
            </div>
        </div>
    </div>

</body>
</html>
