<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker de Victor Manuel Ortega Urbano</title>
    <style>
        /* Fondo degradado tropical inspirado en tu imagen */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: linear-gradient(135deg, #0b429c 0%, #1e3c72 50%, #2a5298 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 1000px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Título Dorado en 3D */
        h1 { 
            color: #ffcc00;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 40px;
            text-shadow: 
                3px 3px 0px #b38600, 
                5px 5px 5px rgba(0, 0, 0, 0.6);
            display: inline-block;
            line-height: 1.3;
        }

        .rocket {
            margin-right: 15px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }

        /* --- ESCENA DEL PERRITO SURFISTA --- */
        .surf-scene {
            position: relative;
            width: 300px;
            height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        /* ANIMACIÓN 1: El balanceo de la tabla de surf sobre las olas */
        .surfboard {
            width: 220px;
            height: 24px;
            background: linear-gradient(to right, #ff4757, #ff6b81, #ffa502);
            border-radius: 50% 50% 40% 40% / 100% 100% 30% 30%;
            box-shadow: 0 12px 20px rgba(0,0,0,0.4), inset 0 -4px 0 rgba(0,0,0,0.2);
            position: relative;
            z-index: 1;
            animation: floatBoard 2s ease-in-out infinite alternate;
        }

        /* ANIMACIÓN 2: El perrito bailando y disfrutando */
        .dancing-puppy {
            position: absolute;
            bottom: 18px;
            width: 140px;
            height: 200px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: puppyDance 1s ease-in-out infinite alternate;
        }

        /* CABEZA DEL PERRITO */
        .head {
            width: 85px;
            height: 80px;
            background-color: #f5f6fa; /* Color blanco/hueso afelpado */
            border-radius: 50% 50% 45% 45%;
            position: relative;
            z-index: 5;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Orejas caídas y tiernas */
        .ear {
            position: absolute;
            top: -5px;
            width: 24px;
            height: 45px;
            background-color: #dcdde1;
            border-radius: 50% 50% 40% 40%;
        }
        .ear.left { left: -5px; transform: rotate(-15deg); }
        .ear.right { right: -5px; transform: rotate(15deg); }

        /* Ojitos dormilones / felices de la imagen */
        .eye {
            position: absolute;
            top: 38px;
            width: 10px;
            height: 6px;
            background-color: #2f3640;
            border-radius: 0 0 10px 10px; /* Curva hacia abajo de felicidad */
        }
        .eye.left { left: 22px; }
        .eye.right { right: 22px; }

        /* Hocico y nariz gordita */
        .snout {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 42px;
            height: 26px;
            background-color: #f5f6fa;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .nose {
            width: 14px;
            height: 9px;
            background-color: #2f3640;
            border-radius: 6px 6px 8px 8px;
            margin-top: 2px;
        }
        .smile {
            width: 12px;
            height: 6px;
            border-bottom: 2px solid #2f3640;
            border-radius: 0 0 8px 8px;
            margin-top: 1px;
        }

        /* LA PANCITA REDONDA DE LA FOTO */
        .chubby-body {
            width: 95px;
            height: 110px;
            background-color: #f5f6fa;
            border-radius: 50% 50% 42% 42% / 60% 60% 40% 40%;
            margin-top: -15px;
            position: relative;
            z-index: 3;
            box-shadow: inset 0 -12px 0 rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
        }
        /* El sombreado de la pancita tierna */
        .belly-highlight {
            width: 75px;
            height: 85px;
            background-color: #ffffff;
            border-radius: 50%;
            position: absolute;
            bottom: 5px;
            opacity: 0.9;
        }

        /* BRAZOS BAILANDO (Animación independiente de ritmo) */
        .arm {
            position: absolute;
            top: 20px;
            width: 22px;
            height: 45px;
            background-color: #f5f6fa;
            border-radius: 12px;
            z-index: 4;
        }
        .arm.left {
            left: -12px;
            transform-origin: top center;
            animation: waveLeftArm 0.5s ease-in-out infinite alternate;
        }
        .arm.right {
            right: -12px;
            transform-origin: top center;
            animation: waveRightArm 0.5s ease-in-out infinite alternate-reverse;
        }

        /* Patitas cortas apoyadas firmes en la tabla */
        .leg {
            position: absolute;
            bottom: -8px;
            width: 26px;
            height: 22px;
            background-color: #dcdde1;
            border-radius: 10px 10px 6px 6px;
            z-index: 2;
            box-shadow: 0 4px 4px rgba(0,0,0,0.2);
        }
        .leg.left { left: 18px; }
        .leg.right { right: 18px; }

        /* --- DETALLES DE ANIMACIÓN EN CSS --- */
        
        /* Balanceo de la tabla de surf */
        @keyframes floatBoard {
            0% { transform: rotate(-5deg) translateY(0); }
            100% { transform: rotate(5deg) translateY(-6px); }
        }

        /* Balanceo coreográfico del cuerpo del perrito */
        @keyframes puppyDance {
            0% { transform: rotate(-4deg) translateX(-3px); }
            100% { transform: rotate(4deg) translateX(3px); }
        }

        /* Brazo izquierdo sube y baja */
        @keyframes waveLeftArm {
            0% { transform: rotate(-40deg); }
            100% { transform: rotate(30deg); }
        }

        /* Brazo derecho se mueve de forma invertida para dar ritmo */
        @keyframes waveRightArm {
            0% { transform: rotate(40deg); }
            100% { transform: rotate(-30deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1><span class="rocket">🚀</span>Bienvenidos al Docker de Victor Manuel Ortega Urbano</h1>
        
        <div class="surf-scene">
            
            <div class="dancing-puppy">
                <div class="ear left"></div>
                <div class="ear right"></div>
                
                <div class="head">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                    <div class="snout">
                        <div class="nose"></div>
                        <div class="smile"></div>
                    </div>
                </div>
                
                <div class="chubby-body">
                    <div class="belly-highlight"></div>
                    <div class="arm left"></div>
                    <div class="arm right"></div>
                </div>

                <div class="leg left"></div>
                <div class="leg right"></div>
            </div>

            <div class="surfboard"></div>
            
        </div>
    </div>

</body>
</html>
